<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5298;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8e2de2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a00e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#333333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#666" />
    </marker>
  </defs>
  
  <style>
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; fill: white; font-weight: bold; text-anchor: middle; }
    .label { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 11px; fill: #efefef; text-anchor: middle; }
  </style>

  <!-- Developer Block -->
  <rect x="20" y="50" width="120" height="80" rx="10" fill="url(#darkGrad)" stroke="#444" stroke-width="2" />
  <text x="80" y="85" class="title">Developer</text>
  <text x="80" y="105" class="label">Local CLI / Git</text>

  <line x1="140" y1="90" x2="175" y2="90" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />

  <!-- GitHub Repository Block -->
  <rect x="180" y="50" width="120" height="80" rx="10" fill="url(#purpleGrad)" />
  <text x="240" y="85" class="title">GitHub Repo</text>
  <text x="240" y="105" class="label">Code &amp; Workflows</text>

  <line x1="300" y1="90" x2="335" y2="90" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />

  <!-- GitHub Actions Block -->
  <rect x="340" y="50" width="120" height="80" rx="10" fill="url(#blueGrad)" />
  <text x="400" y="85" class="title">GitHub Actions</text>
  <text x="400" y="105" class="label">CI (Bandit/TFsec)</text>

  <line x1="460" y1="90" x2="495" y2="90" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Terraform Block -->
  <rect x="500" y="50" width="120" height="80" rx="10" fill="url(#blueGrad)" />
  <text x="560" y="85" class="title">Terraform</text>
  <text x="560" y="105" class="label">Infrastructure IAC</text>

  <line x1="620" y1="90" x2="655" y2="90" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />

  <!-- AWS Account Target -->
  <rect x="660" y="50" width="120" height="80" rx="10" fill="url(#orangeGrad)" />
  <text x="720" y="85" class="title">AWS Target</text>
  <text x="720" y="105" class="label">Deploy Resources</text>
</svg>
