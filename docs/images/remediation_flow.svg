<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" width="100%" height="100%">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5298;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cb2d3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef473a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#333333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#666" />
    </marker>
  </defs>
  
  <style>
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 13px; fill: white; font-weight: bold; text-anchor: middle; }
    .label { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 10px; fill: #efefef; text-anchor: middle; }
  </style>

  <!-- 1. Scan -->
  <rect x="15" y="40" width="110" height="70" rx="8" fill="url(#blueGrad)" />
  <text x="70" y="70" class="title">1. Scan</text>
  <text x="70" y="90" class="label">Identify Idle</text>

  <line x1="125" y1="75" x2="155" y2="75" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />

  <!-- 2. Alert -->
  <rect x="160" y="40" width="110" height="70" rx="8" fill="url(#redGrad)" />
  <text x="215" y="70" class="title">2. Alert</text>
  <text x="215" y="90" class="label">Slack Post</text>

  <line x1="270" y1="75" x2="300" y2="75" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />

  <!-- 3. Approval -->
  <rect x="305" y="40" width="110" height="70" rx="8" fill="url(#orangeGrad)" />
  <text x="360" y="70" class="title">3. Approval</text>
  <text x="360" y="90" class="label">Acknowledge/Fix</text>

  <line x1="415" y1="75" x2="445" y2="75" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />

  <!-- 4. Backup -->
  <rect x="450" y="40" width="110" height="70" rx="8" fill="url(#darkGrad)" stroke="#444" stroke-width="2" />
  <text x="505" y="70" class="title">4. Backup</text>
  <text x="505" y="90" class="label">Create Snapshot</text>

  <line x1="560" y1="75" x2="590" y2="75" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />

  <!-- 5. Remediation -->
  <rect x="595" y="40" width="110" height="70" rx="8" fill="url(#orangeGrad)" />
  <text x="650" y="70" class="title">5. Fix</text>
  <text x="650" y="90" class="label">Stop / Delete</text>

  <line x1="705" y1="75" x2="735" y2="75" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />

  <!-- 6. Audit -->
  <rect x="740" y="40" width="110" height="70" rx="8" fill="url(#greenGrad)" />
  <text x="795" y="70" class="title">6. Audit</text>
  <text x="795" y="90" class="label">Save DDB History</text>
</svg>
