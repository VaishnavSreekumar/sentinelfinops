<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5298;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#333333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#666" />
    </marker>
  </defs>
  
  <style>
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 13px; fill: white; font-weight: bold; text-anchor: middle; }
    .label { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 10px; fill: #efefef; text-anchor: middle; }
    .darkLabel { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 10px; fill: #333; text-anchor: middle; font-weight: bold; }
  </style>

  <!-- EventBridge Trigger -->
  <rect x="20" y="80" width="120" height="80" rx="10" fill="url(#darkGrad)" stroke="#444" stroke-width="2" />
  <text x="80" y="115" class="title">EventBridge</text>
  <text x="80" y="135" class="label">Hourly Trigger</text>

  <line x1="140" y1="120" x2="175" y2="120" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Lambda Scanner -->
  <rect x="180" y="80" width="120" height="80" rx="10" fill="url(#orangeGrad)" />
  <text x="240" y="115" class="title">Lambda Scanner</text>
  <text x="240" y="135" class="label">FinOps Engine</text>

  <line x1="300" y1="120" x2="335" y2="120" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />

  <!-- AWS Organizations -->
  <rect x="340" y="80" width="120" height="80" rx="10" fill="url(#blueGrad)" />
  <text x="400" y="115" class="title">AWS Organizations</text>
  <text x="400" y="135" class="label">Discover Accounts</text>

  <!-- Split lines to member accounts -->
  <path d="M 460 120 L 490 120 L 490 50 L 530 50" fill="none" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 460 120 L 490 120 L 490 190 L 530 190" fill="none" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 460 120 L 530 120" fill="none" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Member Account 1 -->
  <rect x="540" y="10" width="110" height="60" rx="8" fill="url(#greenGrad)" />
  <text x="595" y="40" class="title">Member Acc 1</text>
  <text x="595" y="52" class="label">Assume Role</text>

  <!-- Member Account 2 -->
  <rect x="540" y="90" width="110" height="60" rx="8" fill="url(#greenGrad)" />
  <text x="595" y="120" class="title">Member Acc 2</text>
  <text x="595" y="132" class="label">Assume Role</text>

  <!-- Member Account 3 -->
  <rect x="540" y="170" width="110" height="60" rx="8" fill="url(#greenGrad)" />
  <text x="595" y="200" class="title">Member Acc N</text>
  <text x="595" y="212" class="label">Assume Role</text>

  <!-- Target Resources -->
  <line x1="650" y1="40" x2="685" y2="40" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="650" y1="120" x2="685" y2="120" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="650" y1="200" x2="685" y2="200" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="690" y="10" width="90" height="220" rx="5" fill="#efefef" stroke="#ccc" />
  <text x="735" y="100" class="darkLabel">EC2 / EBS</text>
  <text x="735" y="120" class="darkLabel">CloudWatch</text>
  <text x="735" y="140" class="darkLabel">Metrics / Logs</text>
</svg>
