<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="100%">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5298;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8e2de2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a00e0;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#666" />
    </marker>
  </defs>
  
  <style>
    .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 13px; fill: white; font-weight: bold; text-anchor: middle; }
    .label { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 10px; fill: #efefef; text-anchor: middle; }
  </style>

  <!-- Cost Explorer Block -->
  <rect x="20" y="50" width="130" height="80" rx="10" fill="url(#blueGrad)" />
  <text x="85" y="85" class="title">Cost Explorer</text>
  <text x="85" y="105" class="label">Primary API Savings</text>

  <!-- Connect to Pricing -->
  <path d="M 150 90 L 180 90 L 180 60 L 210 60" fill="none" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Connect to Static -->
  <path d="M 150 90 L 180 90 L 180 120 L 210 120" fill="none" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Pricing API Block -->
  <rect x="220" y="20" width="130" height="60" rx="8" fill="url(#purpleGrad)" />
  <text x="285" y="50" class="title">Pricing API</text>
  <text x="285" y="65" class="label">Real-time Rates</text>

  <!-- Static Estimate Table Block -->
  <rect x="220" y="100" width="130" height="60" rx="8" fill="url(#purpleGrad)" />
  <text x="285" y="130" class="title">Static Tables</text>
  <text x="285" y="145" class="label">Regional Fallback</text>

  <!-- Connect both to Output -->
  <path d="M 350 50 L 380 50 L 380 90 L 410 90" fill="none" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 350 130 L 380 130 L 380 90 L 410 90" fill="none" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Output Savings Estimate Block -->
  <rect x="420" y="50" width="140" height="80" rx="10" fill="url(#greenGrad)" />
  <text x="490" y="85" class="title">Savings Report</text>
  <text x="490" y="105" class="label">Attributed Estimate</text>
</svg>
